<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advena Living — Campaign Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    color: #111111;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 52px 52px 80px;
    max-width: 1300px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 2px solid #111;
  }

  .header-left h1 {
    font-size: 1.35rem;
    font-weight: 600;
    color: #111;
    letter-spacing: -0.02em;
  }

  .header-left p {
    font-size: 0.72rem;
    color: #888;
    margin-top: 5px;
    letter-spacing: 0.02em;
  }

  .header-right {
    text-align: right;
    font-size: 0.72rem;
    color: #888;
    line-height: 1.7;
  }

  .header-right strong {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #111;
    margin-bottom: 2px;
  }

  /* ── KPI Strip ── */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 44px;
  }

  .kpi {
    padding: 18px 20px;
    border-right: 1px solid #e0e0e0;
  }

  .kpi:last-child { border-right: none; }

  .kpi-label {
    font-size: 0.64rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999;
    font-weight: 500;
    margin-bottom: 7px;
  }

  .kpi-val {
    font-size: 1.45rem;
    font-weight: 600;
    color: #111;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .kpi-val.secondary { font-size: 1.3rem; font-weight: 500; color: #444; }

  /* ── Section label ── */
  .section-label {
    font-size: 0.64rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #999;
    margin-bottom: 12px;
  }

  /* ── Facility Block ── */
  .facility {
    margin-bottom: 28px;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .facility-header {
    background: #f7f7f7;
    border-bottom: 1px solid #e0e0e0;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .facility-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: #111;
    letter-spacing: -0.01em;
  }

  .facility-totals {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .fac-total {
    font-size: 0.72rem;
    color: #888;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .fac-total strong {
    font-weight: 700;
    font-size: 1rem;
    color: #111;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 9px 20px;
    text-align: left;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999;
    font-weight: 500;
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    white-space: nowrap;
  }

  thead th:not(:first-child) { text-align: right; }

  tbody tr {
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody tr.inactive { opacity: 0.35; }

  td {
    padding: 10px 20px;
    color: #111;
    white-space: nowrap;
  }

  td:not(:first-child) { text-align: right; }

  .pos-pill {
    display: inline-block;
    background: #f0f0f0;
    border-radius: 3px;
    padding: 2px 8px;
    font-size: 0.7rem;
    font-weight: 500;
    color: #333;
  }

  .inactive-tag {
    font-size: 0.62rem;
    color: #bbb;
    margin-left: 7px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .dash { color: #ddd; }

  .qual-cell {
    display: inline-flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    width: 100%;
  }

  .qual-track {
    width: 50px;
    height: 3px;
    background: #ebebeb;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .qual-fill {
    height: 100%;
    border-radius: 2px;
    background: #111;
  }

  /* ── Footer ── */
  footer {
    margin-top: 48px;
    padding-top: 18px;
    border-top: 1px solid #e0e0e0;
    font-size: 0.68rem;
    color: #bbb;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
  }

  @media (max-width: 900px) {
    body { padding: 24px 18px 60px; }
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Advena Living</h1>
    <p>Meta Recruiting Ads Weekly Report</p>
  </div>
  <div class="header-right">
    <strong>Feb 26 – Mar 20, 2026</strong>
    Attribution: 7-day click or 1-day view<br>
    All amounts in USD
  </div>
</header>

<div class="kpi-strip" id="kpiStrip"></div>

<p class="section-label">Facility Breakdown</p>
<div id="facilities"></div>

<footer>
  <span>Advena Living &nbsp;·&nbsp; Meta Ads Manager Export</span>
  <span>Generated March 20, 2026</span>
</footer>

<script>
const raw = [
  { facility:"Bonner Springs",  position:"CMA",        status:"active",   spend:34.60,  cpa:8.65,  leads:4,  qual:1,  qualRate:25,   cpqc:34.60, interviews:null, hires:null, impressions:1839 },
  { facility:"Bonner Springs",  position:"CNA",        status:"active",   spend:73.82,  cpa:3.52,  leads:21, qual:19, qualRate:90,   cpqc:3.89,  interviews:5,    hires:null, impressions:4914 },
  { facility:"Bonner Springs",  position:"RN",         status:"active",   spend:9.17,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:420  },

  { facility:"Clearwater",      position:"CMA",        status:"inactive", spend:25.19,  cpa:6.30,  leads:4,  qual:4,  qualRate:100,  cpqc:6.30,  interviews:null, hires:null, impressions:1378 },
  { facility:"Clearwater",      position:"CNA",        status:"inactive", spend:74.25,  cpa:4.13,  leads:18, qual:11, qualRate:61,   cpqc:6.75,  interviews:null, hires:null, impressions:5257 },
  { facility:"Clearwater",      position:"RNs & LPNs", status:"active",   spend:14.17,  cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:895  },
  { facility:"Clearwater",      position:"RN",         status:"inactive", spend:0.00,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:1    },

  { facility:"Fountainview",    position:"CMA",        status:"active",   spend:47.10,  cpa:3.93,  leads:12, qual:10, qualRate:83,   cpqc:4.71,  interviews:null, hires:null, impressions:3467 },
  { facility:"Fountainview",    position:"CNA",        status:"active",   spend:57.55,  cpa:3.39,  leads:17, qual:17, qualRate:100,  cpqc:3.39,  interviews:null, hires:null, impressions:4544 },
  { facility:"Fountainview",    position:"LPN",        status:"inactive", spend:2.83,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:154  },
  { facility:"Fountainview",    position:"RNs & LPNs", status:"active",   spend:0.54,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:30   },
  { facility:"Fountainview",    position:"RN",         status:"inactive", spend:0.10,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:13   },

  { facility:"On Tenth",        position:"CMA",        status:"active",   spend:5.20,   cpa:5.20,  leads:1,  qual:1,  qualRate:100,  cpqc:5.20,  interviews:1,    hires:null, impressions:276  },
  { facility:"On Tenth",        position:"CNA",        status:"active",   spend:110.44, cpa:2.83,  leads:39, qual:38, qualRate:97,   cpqc:2.91,  interviews:10,   hires:1,    impressions:8905 },
  { facility:"On Tenth",        position:"RNs & LPNs", status:"inactive", spend:2.26,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:140  },

  { facility:"On Woodlawn",     position:"CNA",        status:"active",   spend:96.79,  cpa:3.12,  leads:31, qual:31, qualRate:100,  cpqc:3.12,  interviews:1,    hires:null, impressions:6968 },
  { facility:"On Woodlawn",     position:"RNs & LPNs", status:"active",   spend:22.31,  cpa:22.31, leads:1,  qual:1,  qualRate:100,  cpqc:22.31, interviews:null, hires:null, impressions:1307 },
];

const facilities = [...new Set(raw.map(r => r.facility))];

const totSpend      = raw.reduce((s,r) => s+r.spend, 0);
const totLeads      = raw.reduce((s,r) => s+r.leads, 0);
const totImpr       = raw.reduce((s,r) => s+r.impressions, 0);
const totQual       = raw.reduce((s,r) => s+r.qual, 0);
const totInterviews = raw.reduce((s,r) => s+(r.interviews||0), 0);
const totHires      = raw.reduce((s,r) => s+(r.hires||0), 0);
const overallQR     = totLeads ? Math.round(totQual/totLeads*100) : 0;
const avgCPA        = totLeads ? totSpend/totLeads : 0;

document.getElementById('kpiStrip').innerHTML = [
  { label:"Total Amount Spent",     val:`$${totSpend.toFixed(2)}` },
  { label:"Total Applicants",       val:totLeads },
  { label:"Avg Cost per Applicant", val:`$${avgCPA.toFixed(2)}` },
  { label:"Impressions",            val:totImpr.toLocaleString(), cls:'secondary' },
].map(k=>`
  <div class="kpi">
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-val ${k.cls||''}">${k.val}</div>
  </div>`).join('');

const container = document.getElementById('facilities');

facilities.forEach((fac, fi) => {
  const rows        = raw.filter(r => r.facility === fac);
  const fSpend      = rows.reduce((s,r) => s+r.spend, 0);
  const fLeads      = rows.reduce((s,r) => s+r.leads, 0);
  const fImpr       = rows.reduce((s,r) => s+r.impressions, 0);
  const fQual       = rows.reduce((s,r) => s+r.qual, 0);
  const fInterviews = rows.reduce((s,r) => s+(r.interviews||0), 0);
  const fHires      = rows.reduce((s,r) => s+(r.hires||0), 0);
  const fQR         = fLeads ? Math.round(fQual/fLeads*100) : null;
  const fCPA        = fLeads ? fSpend/fLeads : null;

  const totalsHtml = `
    <div class="facility-totals">
      <span class="fac-total">Spent<strong>$${fSpend.toFixed(2)}</strong></span>
      <span class="fac-total">Applicants<strong>${fLeads}</strong></span>
      <span class="fac-total">Cost / Applicant<strong>${fCPA ? '$'+fCPA.toFixed(2) : '—'}</strong></span>
      <span class="fac-total">Interviews<strong>${fInterviews || '—'}</strong></span>
      <span class="fac-total">Hires<strong>${fHires || '—'}</strong></span>
      <span class="fac-total">Impressions<strong>${fImpr.toLocaleString()}</strong></span>
      <span class="fac-total">Qual. Rate<strong>${fQR !== null ? fQR+'%' : '—'}</strong></span>
    </div>`;

  const rowsHtml = rows.map(r => {
    const inactive = r.status === 'inactive';
    const cpa  = r.cpa  !== null ? `$${r.cpa.toFixed(2)}`  : `<span class="dash">—</span>`;
    const apps = r.leads > 0    ? r.leads                  : `<span class="dash">—</span>`;
    const cpqc = r.cpqc !== null ? `$${r.cpqc.toFixed(2)}` : `<span class="dash">—</span>`;
    const ivw  = r.interviews   ? r.interviews              : `<span class="dash">—</span>`;
    const hire = r.hires        ? r.hires                   : `<span class="dash">—</span>`;

    let qrCell = `<span class="dash">—</span>`;
    if (r.qualRate !== null) {
      qrCell = `<div class="qual-cell">
        <div class="qual-track"><div class="qual-fill" style="width:${r.qualRate}%"></div></div>
        ${r.qualRate}%
      </div>`;
    }

    return `
      <tr class="${inactive ? 'inactive' : ''}">
        <td><span class="pos-pill">${r.position}</span>${inactive ? '<span class="inactive-tag">Paused</span>' : ''}</td>
        <td>$${r.spend.toFixed(2)}</td>
        <td>${cpa}</td>
        <td>${apps}</td>
        <td>${r.qual > 0 ? r.qual : '<span class="dash">—</span>'}</td>
        <td>${ivw}</td>
        <td>${hire}</td>
        <td>${r.impressions.toLocaleString()}</td>
        <td>${qrCell}</td>
        <td>${cpqc}</td>
      </tr>`;
  }).join('');

  const el = document.createElement('div');
  el.className = 'facility';
  el.style.animationDelay = `${fi * 0.05}s`;
  el.innerHTML = `
    <div class="facility-header">
      <div class="facility-name">Advena Living — ${fac}</div>
      ${totalsHtml}
    </div>
    <table>
      <thead>
        <tr>
          <th>Position</th>
          <th>Amount Spent</th>
          <th>Cost per Application</th>
          <th>Applicants</th>
          <th>Qualified</th>
          <th>Interviews</th>
          <th>Hires</th>
          <th>Impressions</th>
          <th>Qual. Candidate Rate</th>
          <th>Cost per Qual. Candidate</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
  container.appendChild(el);
});
</script>
</body>
</html>
