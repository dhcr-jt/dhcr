<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advena Living — Campaign Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    color: #111111;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 40px 32px 80px;
    max-width: 1500px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 36px;
    padding-bottom: 20px;
    border-bottom: 2px solid #111;
  }

  .header-left h1 {
    font-size: 1.35rem;
    font-weight: 600;
    color: #111;
    letter-spacing: -0.02em;
  }

  .header-left p {
    font-size: 0.72rem;
    color: #888;
    margin-top: 5px;
    letter-spacing: 0.02em;
  }

  .header-right {
    text-align: right;
    font-size: 0.72rem;
    color: #888;
    line-height: 1.7;
  }

  .header-right strong {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #111;
    margin-bottom: 2px;
  }

  /* ── KPI Strip ── */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 36px;
  }

  .kpi {
    padding: 14px 16px;
    border-right: 1px solid #e0e0e0;
  }

  .kpi:last-child { border-right: none; }

  .kpi-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    font-weight: 500;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .kpi-val {
    font-size: 1.25rem;
    font-weight: 600;
    color: #111;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .kpi-val.secondary { font-size: 1.1rem; font-weight: 500; color: #444; }

  /* ── Section label ── */
  .section-label {
    font-size: 0.64rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #999;
    margin-bottom: 12px;
  }

  /* ── Facility Block ── */
  .facility {
    margin-bottom: 24px;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .facility-header {
    background: #f7f7f7;
    border-bottom: 1px solid #e0e0e0;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .facility-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: #111;
    letter-spacing: -0.01em;
    flex-shrink: 0;
  }

  .facility-totals {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .fac-total {
    font-size: 0.68rem;
    color: #888;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .fac-total strong {
    font-weight: 700;
    font-size: 1rem;
    color: #111;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  thead th {
    padding: 8px 8px;
    text-align: right;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
    font-weight: 500;
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    white-space: normal;
    word-break: break-word;
    vertical-align: bottom;
    line-height: 1.3;
  }

  thead th:first-child { text-align: left; }

  /* 12 columns */
  th:nth-child(1)  { width: 12%; } /* Position */
  th:nth-child(2)  { width: 8%;  } /* Status */
  th:nth-child(3)  { width: 9%;  } /* Cost per App */
  th:nth-child(4)  { width: 8%;  } /* Applicants */
  th:nth-child(5)  { width: 8%;  } /* Qualified */
  th:nth-child(6)  { width: 8%;  } /* Interviews */
  th:nth-child(7)  { width: 7%;  } /* Hires */
  th:nth-child(8)  { width: 9%;  } /* Cost per Interview */
  th:nth-child(9)  { width: 9%;  } /* Interview to Hire */
  th:nth-child(10) { width: 8%;  } /* Impressions */
  th:nth-child(11) { width: 14%; } /* Qual. Rate */

  tbody tr {
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody tr.inactive { opacity: 0.35; }

  td {
    padding: 9px 8px;
    color: #111;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  td:first-child { text-align: left; }

  .pos-pill {
    display: inline-block;
    background: #f0f0f0;
    border-radius: 3px;
    padding: 2px 7px;
    font-size: 0.68rem;
    font-weight: 500;
    color: #333;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 5px;
    vertical-align: middle;
  }

  .status-dot.paused { background: #d1d5db; }

  .status-text {
    font-size: 0.68rem;
    color: #888;
    vertical-align: middle;
  }

  .dash { color: #ddd; }

  .qual-cell {
    display: inline-flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    width: 100%;
  }

  .qual-track {
    width: 32px;
    height: 3px;
    background: #ebebeb;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .qual-fill {
    height: 100%;
    border-radius: 2px;
    background: #111;
  }

  /* ── Footer ── */
  footer {
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid #e0e0e0;
    font-size: 0.68rem;
    color: #bbb;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
  }

  @media (max-width: 1000px) {
    body { padding: 20px 14px 60px; }
    .kpi-strip { grid-template-columns: repeat(4, 1fr); }
    table { table-layout: auto; }
    td, th { white-space: normal; font-size: 0.7rem; padding: 7px 6px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Advena Living</h1>
    <p>Meta Recruiting Ads Weekly Report</p>
  </div>
  <div class="header-right">
    <strong>Mar 10 – Apr 2, 2026</strong>
    All amounts in USD
  </div>
</header>

<div class="kpi-strip" id="kpiStrip"></div>

<p class="section-label">Facility Breakdown</p>
<div id="facilities"></div>

<footer>
  <span>Advena Living &nbsp;·&nbsp; Meta Ads Manager Export</span>
  <span>Generated April 2, 2026</span>
</footer>

<script>
const raw = [
  { facility:"On Tenth",       position:"CMA",       status:"active",   spend:43.38,  cpa:8.68,  leads:5,  qual:2,  qualRate:40,   cpqc:8.68,  interviews:2,    hires:null, cpi:21.69,  ith:0,    impressions:2148  },
  { facility:"On Tenth",       position:"CNA",       status:"active",   spend:244.68, cpa:3.88,  leads:63, qual:63, qualRate:100,  cpqc:3.88,  interviews:14,   hires:1,    cpi:17.48,  ith:7,    impressions:18632 },
  { facility:"On Tenth",       position:"RN & LPN",  status:"active",   spend:7.24,   cpa:null,  leads:1,  qual:0,  qualRate:0,    cpqc:7.24,  interviews:null, hires:null, cpi:null,   ith:null, impressions:433   },

  { facility:"Fountainview",   position:"CMA",       status:"active",   spend:107.92, cpa:5.68,  leads:19, qual:16, qualRate:84,   cpqc:5.68,  interviews:2,    hires:null, cpi:53.96,  ith:0,    impressions:6860  },
  { facility:"Fountainview",   position:"CNA",       status:"active",   spend:175.32, cpa:4.17,  leads:42, qual:0,  qualRate:0,    cpqc:4.17,  interviews:5,    hires:1,    cpi:35.06,  ith:20,   impressions:12637 },
  { facility:"Fountainview",   position:"RN & LPN",  status:"active",   spend:2.27,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:0,    hires:null, cpi:null,   ith:null, impressions:157   },

  { facility:"On Woodlawn",    position:"CNA",       status:"active",   spend:143.50, cpa:3.34,  leads:43, qual:43, qualRate:100,  cpqc:3.34,  interviews:1,    hires:null, cpi:143.50, ith:0,    impressions:10346 },
  { facility:"On Woodlawn",    position:"RN & LPN",  status:"active",   spend:159.27, cpa:31.85, leads:5,  qual:0,  qualRate:0,    cpqc:31.85, interviews:null, hires:null, cpi:null,   ith:null, impressions:8195  },

  { facility:"Bonner Springs", position:"CMA",       status:"active",   spend:39.98,  cpa:10.00, leads:4,  qual:4,  qualRate:100,  cpqc:10.00, interviews:null, hires:null, cpi:null,   ith:null, impressions:2072  },
  { facility:"Bonner Springs", position:"CNA",       status:"active",   spend:103.83, cpa:3.85,  leads:27, qual:25, qualRate:93,   cpqc:3.85,  interviews:6,    hires:1,    cpi:17.31,  ith:17,   impressions:6511  },
  { facility:"Bonner Springs", position:"RN",        status:"active",   spend:255.08, cpa:19.62, leads:13, qual:11, qualRate:85,   cpqc:19.62, interviews:1,    hires:null, cpi:255.08, ith:0,    impressions:11133 },

  { facility:"Clearwater",     position:"CMA",       status:"inactive", spend:25.19,  cpa:6.30,  leads:4,  qual:4,  qualRate:100,  cpqc:6.30,  interviews:2,    hires:null, cpi:12.60,  ith:0,    impressions:1378  },
  { facility:"Clearwater",     position:"CNA",       status:"active",   spend:110.77, cpa:4.43,  leads:25, qual:19, qualRate:76,   cpqc:4.43,  interviews:7,    hires:3,    cpi:15.82,  ith:43,   impressions:7621  },
  { facility:"Clearwater",     position:"RN & LPN",  status:"active",   spend:165.44, cpa:13.79, leads:12, qual:5,  qualRate:42,   cpqc:13.79, interviews:4,    hires:1,    cpi:41.36,  ith:25,   impressions:8613  },
];

const facilityOrder = ["Clearwater","On Tenth","Fountainview","Bonner Springs","On Woodlawn"];
const facilities = facilityOrder.filter(f => raw.some(r => r.facility === f));

const totSpend      = raw.reduce((s,r) => s+r.spend, 0);
const totLeads      = raw.reduce((s,r) => s+r.leads, 0);
const totImpr       = raw.reduce((s,r) => s+r.impressions, 0);
const totQual       = raw.reduce((s,r) => s+r.qual, 0);
const totInterviews = raw.reduce((s,r) => s+(r.interviews||0), 0);
const totHires      = raw.reduce((s,r) => s+(r.hires||0), 0);
const overallQR     = totLeads ? Math.round(totQual/totLeads*100) : 0;
const avgCPA        = totLeads ? totSpend/totLeads : 0;
const avgCPI        = totInterviews ? totSpend/totInterviews : 0;
const overallITH    = totInterviews ? Math.round(totHires/totInterviews*100) : 0;

document.getElementById('kpiStrip').innerHTML = [
  { label:"Total Applicants",       val:totLeads },
  { label:"Avg Cost / Applicant",   val:`$${avgCPA.toFixed(2)}` },
  { label:"Total Interviews",       val:totInterviews },
  { label:"Avg Cost / Interview",   val:`$${avgCPI.toFixed(2)}` },
  { label:"Total Hires",            val:totHires },
  { label:"Interview to Hire",      val:`${overallITH}%` },
  { label:"Overall Qual. Rate",     val:`${overallQR}%` },
  { label:"Impressions",            val:totImpr.toLocaleString(), cls:'secondary' },
].map(k=>`
  <div class="kpi">
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-val ${k.cls||''}">${k.val}</div>
  </div>`).join('');

const container = document.getElementById('facilities');

facilities.forEach((fac, fi) => {
  const rows        = raw.filter(r => r.facility === fac);
  const fSpend      = rows.reduce((s,r) => s+r.spend, 0);
  const fLeads      = rows.reduce((s,r) => s+r.leads, 0);
  const fImpr       = rows.reduce((s,r) => s+r.impressions, 0);
  const fQual       = rows.reduce((s,r) => s+r.qual, 0);
  const fInterviews = rows.reduce((s,r) => s+(r.interviews||0), 0);
  const fHires      = rows.reduce((s,r) => s+(r.hires||0), 0);
  const fQR         = fLeads ? Math.round(fQual/fLeads*100) : null;
  const fCPA        = fLeads ? fSpend/fLeads : null;
  const fCPI        = fInterviews ? fSpend/fInterviews : null;
  const fITH        = fInterviews ? Math.round(fHires/fInterviews*100) : null;

  const totalsHtml = `
    <div class="facility-totals">
      <span class="fac-total">Applicants<strong>${fLeads}</strong></span>
      <span class="fac-total">Cost / Applicant<strong>${fCPA ? '$'+fCPA.toFixed(2) : '—'}</strong></span>
      <span class="fac-total">Interviews<strong>${fInterviews || '—'}</strong></span>
      <span class="fac-total">Cost / Interview<strong>${fCPI ? '$'+fCPI.toFixed(2) : '—'}</strong></span>
      <span class="fac-total">Hires<strong>${fHires || '—'}</strong></span>
      <span class="fac-total">Interview to Hire<strong>${fITH !== null ? fITH+'%' : '—'}</strong></span>
      <span class="fac-total">Impressions<strong>${fImpr.toLocaleString()}</strong></span>
      <span class="fac-total">Qual. Rate<strong>${fQR !== null ? fQR+'%' : '—'}</strong></span>
    </div>`;

  const rowsHtml = rows.map(r => {
    const inactive = r.status === 'inactive';
    const f2 = v => v !== null && v !== undefined ? `$${v.toFixed(2)}` : `<span class="dash">—</span>`;
    const fn = v => v !== null && v !== undefined ? v : `<span class="dash">—</span>`;
    const fp = v => v !== null && v !== undefined ? `${v}%` : `<span class="dash">—</span>`;

    let qrCell = `<span class="dash">—</span>`;
    if (r.qualRate !== null && r.qualRate > 0) {
      qrCell = `<div class="qual-cell">
        <div class="qual-track"><div class="qual-fill" style="width:${Math.min(r.qualRate,100)}%"></div></div>
        ${r.qualRate}%
      </div>`;
    }

    const statusHtml = `<span class="status-dot ${inactive ? 'paused' : ''}"></span><span class="status-text">${inactive ? 'Paused' : 'Active'}</span>`;

    return `
      <tr class="${inactive ? 'inactive' : ''}">
        <td><span class="pos-pill">${r.position}</span></td>
        <td>${statusHtml}</td>
        <td>${f2(r.cpa)}</td>
        <td>${r.leads > 0 ? r.leads : '<span class="dash">—</span>'}</td>
        <td>${r.qual > 0 ? r.qual : '<span class="dash">—</span>'}</td>
        <td>${fn(r.interviews)}</td>
        <td>${fn(r.hires)}</td>
        <td>${f2(r.cpi)}</td>
        <td>${r.ith !== null && r.ith !== undefined ? r.ith+'%' : '<span class="dash">—</span>'}</td>
        <td>${r.impressions.toLocaleString()}</td>
        <td>${qrCell}</td>
      </tr>`;
  }).join('');

  const el = document.createElement('div');
  el.className = 'facility';
  el.style.animationDelay = `${fi * 0.05}s`;
  el.innerHTML = `
    <div class="facility-header">
      <div class="facility-name">Advena Living — ${fac}</div>
      ${totalsHtml}
    </div>
    <table>
      <thead>
        <tr>
          <th style="text-align:left">Position</th>
          <th>Status</th>
          <th>Cost per Application</th>
          <th>Applicants</th>
          <th>Qualified</th>
          <th>Interviews</th>
          <th>Hires</th>
          <th>Cost per Interview</th>
          <th>Interview to Hire</th>
          <th>Impressions</th>
          <th>Qual. Candidate Rate</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
  container.appendChild(el);
});
</script>
</body>
</html>
