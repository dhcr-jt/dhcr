<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advena Living — Campaign Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    color: #111111;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 40px 32px 80px;
    max-width: 1500px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 36px;
    padding-bottom: 20px;
    border-bottom: 2px solid #111;
  }

  .header-left h1 {
    font-size: 1.35rem;
    font-weight: 600;
    color: #111;
    letter-spacing: -0.02em;
  }

  .header-left p {
    font-size: 0.72rem;
    color: #888;
    margin-top: 5px;
    letter-spacing: 0.02em;
  }

  .header-right {
    text-align: right;
    font-size: 0.72rem;
    color: #888;
    line-height: 1.7;
  }

  .header-right strong {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #111;
    margin-bottom: 2px;
  }

  /* ── KPI Strip ── */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 36px;
  }

  .kpi {
    padding: 14px 16px;
    border-right: 1px solid #e0e0e0;
  }

  .kpi:last-child { border-right: none; }

  .kpi-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #999;
    font-weight: 500;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .kpi-val {
    font-size: 1.25rem;
    font-weight: 600;
    color: #111;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .kpi-val.secondary { font-size: 1.1rem; font-weight: 500; color: #444; }

  /* ── Section label ── */
  .section-label {
    font-size: 0.64rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #999;
    margin-bottom: 12px;
  }

  /* ── Facility Block ── */
  .facility {
    margin-bottom: 24px;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .facility-header {
    background: #f7f7f7;
    border-bottom: 1px solid #e0e0e0;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .facility-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: #111;
    letter-spacing: -0.01em;
    flex-shrink: 0;
  }

  .facility-totals {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .fac-total {
    font-size: 0.68rem;
    color: #888;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .fac-total strong {
    font-weight: 700;
    font-size: 1rem;
    color: #111;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  thead th {
    padding: 8px 8px;
    text-align: right;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
    font-weight: 500;
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    white-space: normal;
    word-break: break-word;
    vertical-align: bottom;
    line-height: 1.3;
  }

  thead th:first-child { text-align: left; }

  /* 12 columns */
  th:nth-child(1)  { width: 12%; } /* Position */
  th:nth-child(2)  { width: 8%;  } /* Status */
  th:nth-child(3)  { width: 9%;  } /* Cost per App */
  th:nth-child(4)  { width: 8%;  } /* Applicants */
  th:nth-child(5)  { width: 8%;  } /* Qualified */
  th:nth-child(6)  { width: 8%;  } /* Interviews */
  th:nth-child(7)  { width: 7%;  } /* Hires */
  th:nth-child(8)  { width: 9%;  } /* Cost per Interview */
  th:nth-child(9)  { width: 9%;  } /* Interview to Hire */
  th:nth-child(10) { width: 8%;  } /* Impressions */
  th:nth-child(11) { width: 14%; } /* Qual. Rate */

  tbody tr {
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody tr.inactive { opacity: 0.35; }

  td {
    padding: 9px 8px;
    color: #111;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  td:first-child { text-align: left; }

  .pos-pill {
    display: inline-block;
    background: #f0f0f0;
    border-radius: 3px;
    padding: 2px 7px;
    font-size: 0.68rem;
    font-weight: 500;
    color: #333;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 5px;
    vertical-align: middle;
  }

  .status-dot.paused { background: #d1d5db; }

  .status-text {
    font-size: 0.68rem;
    color: #888;
    vertical-align: middle;
  }

  .dash { color: #ddd; }

  .qual-cell {
    display: inline-flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    width: 100%;
  }

  .qual-track {
    width: 32px;
    height: 3px;
    background: #ebebeb;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .qual-fill {
    height: 100%;
    border-radius: 2px;
    background: #111;
  }

  /* ── Footer ── */
  footer {
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid #e0e0e0;
    font-size: 0.68rem;
    color: #bbb;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
  }

  @media (max-width: 1000px) {
    body { padding: 20px 14px 60px; }
    .kpi-strip { grid-template-columns: repeat(4, 1fr); }
    table { table-layout: auto; }
    td, th { white-space: normal; font-size: 0.7rem; padding: 7px 6px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Advena Living</h1>
    <p>Meta Recruiting Ads Weekly Report</p>
  </div>
  <div class="header-right">
    <strong>Mar 10 – Apr 24, 2026</strong>
    All amounts in USD
  </div>
</header>

<div class="kpi-strip" id="kpiStrip"></div>

<p class="section-label">Facility Breakdown</p>
<div id="facilities"></div>

<footer>
  <span>Advena Living &nbsp;·&nbsp; Meta Ads Manager Export</span>
  <span>Generated April 2, 2026</span>
</footer>

<script>
const raw = [
  { facility:"On Woodlawn",    position:"CMA",       status:"active",   spend:36.99,  cpa:1.76,  leads:21, qual:20, qualRate:95,   cpqc:1.85,  interviews:1,  hires:0, cpi:36.99,  ith:0,    impressions:3453  },
  { facility:"On Woodlawn",    position:"CNA",       status:"inactive", spend:170.11, cpa:3.47,  leads:49, qual:49, qualRate:100,  cpqc:3.47,  interviews:18, hires:7, cpi:9.45,   ith:39,   impressions:12754 },
  { facility:"On Woodlawn",    position:"LPN",       status:"active",   spend:81.74,  cpa:10.22, leads:8,  qual:6,  qualRate:75,   cpqc:13.62, interviews:0,  hires:0, cpi:null,   ith:null, impressions:6257  },
  { facility:"On Woodlawn",    position:"RN & LPN",  status:"inactive", spend:312.58, cpa:62.52, leads:5,  qual:5,  qualRate:100,  cpqc:62.52, interviews:0,  hires:0, cpi:null,   ith:null, impressions:15179 },
  { facility:"On Woodlawn",    position:"RN",        status:"active",   spend:16.26,  cpa:8.13,  leads:2,  qual:2,  qualRate:100,  cpqc:8.13,  interviews:0,  hires:0, cpi:null,   ith:null, impressions:964   },

  { facility:"On Tenth",       position:"CNA",       status:"active",   spend:268.57, cpa:3.89,  leads:69, qual:69, qualRate:100,  cpqc:3.89,  interviews:18, hires:5, cpi:14.92,  ith:28,   impressions:20758 },
  { facility:"On Tenth",       position:"CMA",       status:"active",   spend:72.33,  cpa:8.04,  leads:9,  qual:9,  qualRate:100,  cpqc:8.04,  interviews:5,  hires:0, cpi:14.47,  ith:0,    impressions:4264  },
  { facility:"On Tenth",       position:"RN & LPN",  status:"active",   spend:279.45, cpa:23.29, leads:12, qual:12, qualRate:100,  cpqc:23.29, interviews:1,  hires:0, cpi:279.45, ith:0,    impressions:15949 },

  { facility:"Clearwater",     position:"CNA",       status:"active",   spend:296.46, cpa:5.29,  leads:56, qual:48, qualRate:86,   cpqc:6.18,  interviews:13, hires:3, cpi:22.80,  ith:23,   impressions:21519 },
  { facility:"Clearwater",     position:"RN & LPN",  status:"active",   spend:288.82, cpa:16.05, leads:18, qual:19, qualRate:100,  cpqc:15.20, interviews:4,  hires:2, cpi:72.21,  ith:50,   impressions:15711 },
  { facility:"Clearwater",     position:"CMA",       status:"inactive", spend:30.27,  cpa:6.05,  leads:5,  qual:5,  qualRate:100,  cpqc:6.05,  interviews:2,  hires:0, cpi:15.14,  ith:0,    impressions:1602  },

  { facility:"Fountainview",   position:"CNA",       status:"inactive", spend:179.57, cpa:4.28,  leads:42, qual:42, qualRate:100,  cpqc:4.28,  interviews:12, hires:1, cpi:14.96,  ith:8,    impressions:12868 },
  { facility:"Fountainview",   position:"CMA",       status:"inactive", spend:109.13, cpa:5.74,  leads:19, qual:17, qualRate:89,   cpqc:6.42,  interviews:4,  hires:0, cpi:27.28,  ith:0,    impressions:6907  },
  { facility:"Fountainview",   position:"RN & LPN",  status:"active",   spend:300.56, cpa:23.12, leads:13, qual:11, qualRate:85,   cpqc:27.32, interviews:3,  hires:0, cpi:100.19, ith:0,    impressions:16655 },

  { facility:"Bonner Springs", position:"CNA",       status:"active",   spend:162.93, cpa:4.18,  leads:39, qual:31, qualRate:79,   cpqc:5.26,  interviews:7,  hires:1, cpi:23.28,  ith:14,   impressions:10162 },
  { facility:"Bonner Springs", position:"RN",        status:"active",   spend:383.82, cpa:21.32, leads:18, qual:15, qualRate:83,   cpqc:25.59, interviews:1,  hires:0, cpi:383.82, ith:0,    impressions:17552 },
  { facility:"Bonner Springs", position:"CMA",       status:"active",   spend:90.99,  cpa:9.10,  leads:10, qual:7,  qualRate:70,   cpqc:13.00, interviews:0,  hires:0, cpi:null,   ith:null, impressions:4652  },
];

const facilityOrder = ["On Woodlawn","On Tenth","Clearwater","Fountainview","Bonner Springs"];
const facilities = facilityOrder.filter(f => raw.some(r => r.facility === f));

const totSpend      = raw.reduce((s,r) => s+r.spend, 0);
const totLeads      = raw.reduce((s,r) => s+r.leads, 0);
const totImpr       = raw.reduce((s,r) => s+r.impressions, 0);
const totQual       = raw.reduce((s,r) => s+r.qual, 0);
const totInterviews = raw.reduce((s,r) => s+(r.interviews||0), 0);
const totHires      = raw.reduce((s,r) => s+(r.hires||0), 0);
const overallQR     = totLeads ? Math.round(totQual/totLeads*100) : 0;
const avgCPA        = totLeads ? totSpend/totLeads : 0;
const avgCPI        = totInterviews ? totSpend/totInterviews : 0;
const overallITH    = totInterviews ? Math.round(totHires/totInterviews*100) : 0;

document.getElementById('kpiStrip').innerHTML = [
  { label:"Total Applicants",       val:totLeads },
  { label:"Avg Cost / Applicant",   val:`$${avgCPA.toFixed(2)}` },
  { label:"Total Interviews",       val:totInterviews },
  { label:"Avg Cost / Interview",   val:`$${avgCPI.toFixed(2)}` },
  { label:"Total Hires",            val:totHires },
  { label:"Interview to Hire",      val:`${overallITH}%` },
  { label:"Overall Qual. Rate",     val:`${overallQR}%` },
  { label:"Impressions",            val:totImpr.toLocaleString(), cls:'secondary' },
].map(k=>`
  <div class="kpi">
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-val ${k.cls||''}">${k.val}</div>
  </div>`).join('');

const container = document.getElementById('facilities');

facilities.forEach((fac, fi) => {
  const rows        = raw.filter(r => r.facility === fac);
  const fSpend      = rows.reduce((s,r) => s+r.spend, 0);
  const fLeads      = rows.reduce((s,r) => s+r.leads, 0);
  const fImpr       = rows.reduce((s,r) => s+r.impressions, 0);
  const fQual       = rows.reduce((s,r) => s+r.qual, 0);
  const fInterviews = rows.reduce((s,r) => s+(r.interviews||0), 0);
  const fHires      = rows.reduce((s,r) => s+(r.hires||0), 0);
  const fQR         = fLeads ? Math.round(fQual/fLeads*100) : null;
  const fCPA        = fLeads ? fSpend/fLeads : null;
  const fCPI        = fInterviews ? fSpend/fInterviews : null;
  const fITH        = fInterviews ? Math.round(fHires/fInterviews*100) : null;

  const totalsHtml = `
    <div class="facility-totals">
      <span class="fac-total">Applicants<strong>${fLeads}</strong></span>
      <span class="fac-total">Cost / Applicant<strong>${fCPA ? '$'+fCPA.toFixed(2) : '—'}</strong></span>
      <span class="fac-total">Interviews<strong>${fInterviews || '—'}</strong></span>
      <span class="fac-total">Cost / Interview<strong>${fCPI ? '$'+fCPI.toFixed(2) : '—'}</strong></span>
      <span class="fac-total">Hires<strong>${fHires || '—'}</strong></span>
      <span class="fac-total">Interview to Hire<strong>${fITH !== null ? fITH+'%' : '—'}</strong></span>
      <span class="fac-total">Impressions<strong>${fImpr.toLocaleString()}</strong></span>
      <span class="fac-total">Qual. Rate<strong>${fQR !== null ? fQR+'%' : '—'}</strong></span>
    </div>`;

  const rowsHtml = rows.map(r => {
    const inactive = r.status === 'inactive';
    const f2 = v => v !== null && v !== undefined ? `$${v.toFixed(2)}` : `<span class="dash">—</span>`;
    const fn = v => v !== null && v !== undefined ? v : `<span class="dash">—</span>`;
    const fp = v => v !== null && v !== undefined ? `${v}%` : `<span class="dash">—</span>`;

    let qrCell = `<span class="dash">—</span>`;
    if (r.qualRate !== null && r.qualRate > 0) {
      qrCell = `<div class="qual-cell">
        <div class="qual-track"><div class="qual-fill" style="width:${Math.min(r.qualRate,100)}%"></div></div>
        ${r.qualRate}%
      </div>`;
    }

    const statusHtml = `<span class="status-dot ${inactive ? 'paused' : ''}"></span><span class="status-text">${inactive ? 'Paused' : 'Active'}</span>`;

    return `
      <tr class="${inactive ? 'inactive' : ''}">
        <td><span class="pos-pill">${r.position}</span></td>
        <td>${statusHtml}</td>
        <td>${f2(r.cpa)}</td>
        <td>${r.leads > 0 ? r.leads : '<span class="dash">—</span>'}</td>
        <td>${r.qual > 0 ? r.qual : '<span class="dash">—</span>'}</td>
        <td>${fn(r.interviews)}</td>
        <td>${fn(r.hires)}</td>
        <td>${f2(r.cpi)}</td>
        <td>${r.ith !== null && r.ith !== undefined ? r.ith+'%' : '<span class="dash">—</span>'}</td>
        <td>${r.impressions.toLocaleString()}</td>
        <td>${qrCell}</td>
      </tr>`;
  }).join('');

  const el = document.createElement('div');
  el.className = 'facility';
  el.style.animationDelay = `${fi * 0.05}s`;
  el.innerHTML = `
    <div class="facility-header">
      <div class="facility-name">Advena Living — ${fac}</div>
      ${totalsHtml}
    </div>
    <table>
      <thead>
        <tr>
          <th style="text-align:left">Position</th>
          <th>Status</th>
          <th>Cost per Application</th>
          <th>Applicants</th>
          <th>Qualified</th>
          <th>Interviews</th>
          <th>Hires</th>
          <th>Cost per Interview</th>
          <th>Interview to Hire</th>
          <th>Impressions</th>
          <th>Qual. Candidate Rate</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
  container.appendChild(el);
});
</script>
</body>
</html>
