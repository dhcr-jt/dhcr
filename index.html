<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advena Living — Campaign Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    color: #111111;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 40px 32px 80px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 36px;
    padding-bottom: 20px;
    border-bottom: 2px solid #111;
  }

  .header-left h1 {
    font-size: 1.35rem;
    font-weight: 600;
    color: #111;
    letter-spacing: -0.02em;
  }

  .header-left p {
    font-size: 0.72rem;
    color: #888;
    margin-top: 5px;
    letter-spacing: 0.02em;
  }

  .header-right {
    text-align: right;
    font-size: 0.72rem;
    color: #888;
    line-height: 1.7;
  }

  .header-right strong {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #111;
    margin-bottom: 2px;
  }

  /* ── KPI Strip ── */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 36px;
  }

  .kpi {
    padding: 16px 18px;
    border-right: 1px solid #e0e0e0;
  }

  .kpi:last-child { border-right: none; }

  .kpi-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: #999;
    font-weight: 500;
    margin-bottom: 6px;
    white-space: nowrap;
  }

  .kpi-val {
    font-size: 1.35rem;
    font-weight: 600;
    color: #111;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .kpi-val.secondary { font-size: 1.2rem; font-weight: 500; color: #444; }

  /* ── Section label ── */
  .section-label {
    font-size: 0.64rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #999;
    margin-bottom: 12px;
  }

  /* ── Facility Block ── */
  .facility {
    margin-bottom: 24px;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .facility-header {
    background: #f7f7f7;
    border-bottom: 1px solid #e0e0e0;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .facility-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: #111;
    letter-spacing: -0.01em;
    flex-shrink: 0;
  }

  .facility-totals {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .fac-total {
    font-size: 0.68rem;
    color: #888;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .fac-total strong {
    font-weight: 700;
    font-size: 1rem;
    color: #111;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  thead th {
    padding: 8px 8px;
    text-align: left;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
    font-weight: 500;
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    white-space: normal;
    word-break: break-word;
    vertical-align: bottom;
    line-height: 1.3;
  }

  thead th:not(:first-child) { text-align: right; }

  /* Column widths — 10 columns totalling 100% */
  th:nth-child(1)  { width: 12%; } /* Position */
  th:nth-child(2)  { width: 10%; } /* Amount Spent */
  th:nth-child(3)  { width: 10%; } /* Cost per App */
  th:nth-child(4)  { width: 8%;  } /* Applicants */
  th:nth-child(5)  { width: 8%;  } /* Qualified */
  th:nth-child(6)  { width: 8%;  } /* Interviews */
  th:nth-child(7)  { width: 7%;  } /* Hires */
  th:nth-child(8)  { width: 9%;  } /* Impressions */
  th:nth-child(9)  { width: 14%; } /* Qual. Rate */
  th:nth-child(10) { width: 14%; } /* Cost per Qual */

  tbody tr {
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody tr.inactive { opacity: 0.35; }

  td {
    padding: 9px 8px;
    color: #111;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  td:not(:first-child) { text-align: right; }

  .pos-pill {
    display: inline-block;
    background: #f0f0f0;
    border-radius: 3px;
    padding: 2px 7px;
    font-size: 0.68rem;
    font-weight: 500;
    color: #333;
  }

  .inactive-tag {
    font-size: 0.6rem;
    color: #bbb;
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .dash { color: #ddd; }

  .qual-cell {
    display: inline-flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    width: 100%;
  }

  .qual-track {
    width: 32px;
    height: 3px;
    background: #ebebeb;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .qual-fill {
    height: 100%;
    border-radius: 2px;
    background: #111;
  }

  /* ── Footer ── */
  footer {
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid #e0e0e0;
    font-size: 0.68rem;
    color: #bbb;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
  }

  @media (max-width: 900px) {
    body { padding: 20px 14px 60px; }
    .kpi-strip { grid-template-columns: repeat(3, 1fr); }
    table { table-layout: auto; }
    td, th { white-space: normal; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Advena Living</h1>
    <p>Meta Recruiting Ads Weekly Report</p>
  </div>
  <div class="header-right">
    <strong>Mar 10 – Mar 27, 2026</strong>
    All amounts in USD
  </div>
</header>

<div class="kpi-strip" id="kpiStrip"></div>

<p class="section-label">Facility Breakdown</p>
<div id="facilities"></div>

<footer>
  <span>Advena Living &nbsp;·&nbsp; Meta Ads Manager Export</span>
  <span>Generated March 20, 2026</span>
</footer>

<script>
const raw = [
  { facility:"On Tenth",        position:"CMA",        status:"active",   spend:22.83,  cpa:5.71,  leads:4,  qual:2,  qualRate:50,   cpqc:11.42, interviews:1,    hires:null, impressions:1161  },
  { facility:"On Tenth",        position:"CNA",        status:"active",   spend:172.23, cpa:3.25,  leads:53, qual:53, qualRate:100,  cpqc:3.25,  interviews:12,   hires:1,    impressions:13525 },
  { facility:"On Tenth",        position:"RNs & LPNs", status:"active",   spend:5.66,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:339   },

  { facility:"Fountainview",    position:"CMA",        status:"active",   spend:76.98,  cpa:4.81,  leads:16, qual:14, qualRate:88,   cpqc:5.50,  interviews:2,    hires:null, impressions:5324  },
  { facility:"Fountainview",    position:"CNA",        status:"active",   spend:110.81, cpa:3.69,  leads:30, qual:30, qualRate:100,  cpqc:3.69,  interviews:3,    hires:null, impressions:8256  },
  { facility:"Fountainview",    position:"RNs & LPNs", status:"active",   spend:1.74,   cpa:null,  leads:0,  qual:0,  qualRate:null, cpqc:null,  interviews:null, hires:null, impressions:107   },

  { facility:"On Woodlawn",     position:"CNA",        status:"active",   spend:114.35, cpa:3.27,  leads:35, qual:35, qualRate:100,  cpqc:3.27,  interviews:1,    hires:null, impressions:8278  },
  { facility:"On Woodlawn",     position:"RNs & LPNs", status:"active",   spend:89.55,  cpa:29.85, leads:3,  qual:3,  qualRate:100,  cpqc:29.85, interviews:null, hires:null, impressions:4893  },

  { facility:"Bonner Springs",  position:"CNA",        status:"active",   spend:86.27,  cpa:3.32,  leads:26, qual:24, qualRate:92,   cpqc:3.59,  interviews:5,    hires:1,    impressions:5649  },
  { facility:"Bonner Springs",  position:"CMA",        status:"active",   spend:37.39,  cpa:9.35,  leads:4,  qual:4,  qualRate:100,  cpqc:9.35,  interviews:null, hires:null, impressions:1983  },
  { facility:"Bonner Springs",  position:"RN",         status:"active",   spend:113.16, cpa:22.63, leads:5,  qual:3,  qualRate:60,   cpqc:37.72, interviews:null, hires:null, impressions:5177  },

  { facility:"Clearwater",      position:"CNA",        status:"inactive", spend:74.25,  cpa:4.13,  leads:18, qual:13, qualRate:null, cpqc:5.71,  interviews:2,    hires:1,    impressions:5257  },
  { facility:"Clearwater",      position:"RNs & LPNs", status:"active",   spend:97.02,  cpa:13.86, leads:9,  qual:9,  qualRate:100,  cpqc:10.78, interviews:4,    hires:null, impressions:5180  },
  { facility:"Clearwater",      position:"CMA",        status:"inactive", spend:25.19,  cpa:6.30,  leads:4,  qual:4,  qualRate:100,  cpqc:6.30,  interviews:null, hires:null, impressions:1378  },
];

const facilityOrder = ["On Tenth","Fountainview","On Woodlawn","Bonner Springs","Clearwater"];
const facilities = facilityOrder.filter(f => raw.some(r => r.facility === f));

const totSpend      = raw.reduce((s,r) => s+r.spend, 0);
const totLeads      = raw.reduce((s,r) => s+r.leads, 0);
const totImpr       = raw.reduce((s,r) => s+r.impressions, 0);
const totQual       = raw.reduce((s,r) => s+r.qual, 0);
const totInterviews = raw.reduce((s,r) => s+(r.interviews||0), 0);
const totHires      = raw.reduce((s,r) => s+(r.hires||0), 0);
const overallQR     = totLeads ? Math.round(totQual/totLeads*100) : 0;
const avgCPA        = totLeads ? totSpend/totLeads : 0;

document.getElementById('kpiStrip').innerHTML = [
  { label:"Total Amount Spent",     val:`$${totSpend.toFixed(2)}` },
  { label:"Total Applicants",       val:totLeads },
  { label:"Avg Cost per Applicant", val:`$${avgCPA.toFixed(2)}` },
  { label:"Total Interviews",       val:totInterviews },
  { label:"Total Hires",            val:totHires },
  { label:"Impressions",            val:totImpr.toLocaleString(), cls:'secondary' },
].map(k=>`
  <div class="kpi">
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-val ${k.cls||''}">${k.val}</div>
  </div>`).join('');

const container = document.getElementById('facilities');

facilities.forEach((fac, fi) => {
  const rows        = raw.filter(r => r.facility === fac);
  const fSpend      = rows.reduce((s,r) => s+r.spend, 0);
  const fLeads      = rows.reduce((s,r) => s+r.leads, 0);
  const fImpr       = rows.reduce((s,r) => s+r.impressions, 0);
  const fQual       = rows.reduce((s,r) => s+r.qual, 0);
  const fInterviews = rows.reduce((s,r) => s+(r.interviews||0), 0);
  const fHires      = rows.reduce((s,r) => s+(r.hires||0), 0);
  const fQR         = fLeads ? Math.round(fQual/fLeads*100) : null;
  const fCPA        = fLeads ? fSpend/fLeads : null;

  const totalsHtml = `
    <div class="facility-totals">
      <span class="fac-total">Spent<strong>$${fSpend.toFixed(2)}</strong></span>
      <span class="fac-total">Applicants<strong>${fLeads}</strong></span>
      <span class="fac-total">Cost / Applicant<strong>${fCPA ? '$'+fCPA.toFixed(2) : '—'}</strong></span>
      <span class="fac-total">Interviews<strong>${fInterviews || '—'}</strong></span>
      <span class="fac-total">Hires<strong>${fHires || '—'}</strong></span>
      <span class="fac-total">Impressions<strong>${fImpr.toLocaleString()}</strong></span>
      <span class="fac-total">Qual. Rate<strong>${fQR !== null ? fQR+'%' : '—'}</strong></span>
    </div>`;

  const rowsHtml = rows.map(r => {
    const inactive = r.status === 'inactive';
    const cpa  = r.cpa  !== null ? `$${r.cpa.toFixed(2)}`  : `<span class="dash">—</span>`;
    const apps = r.leads > 0    ? r.leads                  : `<span class="dash">—</span>`;
    const cpqc = r.cpqc !== null ? `$${r.cpqc.toFixed(2)}` : `<span class="dash">—</span>`;
    const ivw  = r.interviews   ? r.interviews              : `<span class="dash">—</span>`;
    const hire = r.hires        ? r.hires                   : `<span class="dash">—</span>`;

    let qrCell = `<span class="dash">—</span>`;
    if (r.qualRate !== null) {
      qrCell = `<div class="qual-cell">
        <div class="qual-track"><div class="qual-fill" style="width:${r.qualRate}%"></div></div>
        ${r.qualRate}%
      </div>`;
    }

    return `
      <tr class="${inactive ? 'inactive' : ''}">
        <td><span class="pos-pill">${r.position}</span>${inactive ? '<span class="inactive-tag">Paused</span>' : ''}</td>
        <td>$${r.spend.toFixed(2)}</td>
        <td>${cpa}</td>
        <td>${apps}</td>
        <td>${r.qual > 0 ? r.qual : '<span class="dash">—</span>'}</td>
        <td>${ivw}</td>
        <td>${hire}</td>
        <td>${r.impressions.toLocaleString()}</td>
        <td>${qrCell}</td>
        <td>${cpqc}</td>
      </tr>`;
  }).join('');

  const el = document.createElement('div');
  el.className = 'facility';
  el.style.animationDelay = `${fi * 0.05}s`;
  el.innerHTML = `
    <div class="facility-header">
      <div class="facility-name">Advena Living — ${fac}</div>
      ${totalsHtml}
    </div>
    <table>
      <thead>
        <tr>
          <th>Position</th>
          <th>Amount Spent</th>
          <th>Cost per Application</th>
          <th>Applicants</th>
          <th>Qualified</th>
          <th>Interviews</th>
          <th>Hires</th>
          <th>Impressions</th>
          <th>Qual. Candidate Rate</th>
          <th>Cost per Qual. Candidate</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
  container.appendChild(el);
});
</script>
</body>
</html>
